<svg viewBox="0 0 128 132" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Box'in House Gourmet">
  <defs>
    <linearGradient id="bhgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c878"/>
      <stop offset=".48" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#9c7a2f"/>
    </linearGradient>
  </defs>
  <!-- house outline -->
  <g fill="none" stroke="url(#bhgold)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 60 L64 24 L106 60"/>
    <path d="M33 57 L33 104 L95 104 L95 57"/>
    <!-- candle stem on roof right -->
    <path d="M88 33 L88 47"/>
    <!-- plate -->
    <circle cx="64" cy="78" r="22" stroke-width="4.5"/>
  </g>
  <!-- flame -->
  <path d="M88 26 C92.5 30 92.5 35 88 36.5 C83.5 35 83.5 30 88 26 Z" fill="url(#bhgold)"/>
  <!-- steam wisp -->
  <path d="M96 22 c3 -3 -3 -6 0 -9" fill="none" stroke="url(#bhgold)" stroke-width="2.2" stroke-linecap="round" opacity=".8"/>
  <!-- cutlery on plate -->
  <g fill="url(#bhgold)">
    <!-- fork -->
    <rect x="54.2" y="69" width="3.1" height="22" rx="1.5"/>
    <rect x="50.4" y="65" width="2.1" height="9" rx="1"/>
    <rect x="54.7" y="65" width="2.1" height="9" rx="1"/>
    <rect x="59" y="65" width="2.1" height="9" rx="1"/>
    <path d="M50.4 73 h11 v1.6 a5.5 5.5 0 0 1 -11 0 Z"/>
    <!-- knife -->
    <rect x="71" y="69" width="3.1" height="22" rx="1.5"/>
    <path d="M71 65 c5.4 0 7.2 4.4 6.2 12.6 l-6.2 0 Z"/>
  </g>
</svg>
