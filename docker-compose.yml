services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-bep}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-box_e_pudim}?schema=public
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-bep_session}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      ARGON_SECRET: ${ARGON_SECRET:?set ARGON_SECRET}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@brazilianpudding.com}
      ADMIN_INITIAL_PASS: ${ADMIN_INITIAL_PASS:?set ADMIN_INITIAL_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://187.77.226.144:8080}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-brazilianpudding}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-hello@brazilianpudding.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET: ${STRIPE_SECRET:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-box_e_pudim}
    volumes:
      - bep_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bep} -d ${POSTGRES_DB:-box_e_pudim}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  bep_pgdata:
